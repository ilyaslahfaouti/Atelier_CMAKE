name: Automatisation des tests
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build

  tests:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: t1
            exe: src/calculator
            args: "add 2 3"
          - id: t2
            exe: src/calculator
            args: "sub 3 -2"
          - id: t3
            exe: src/calculator
            args: "mul 5 5"
          - id: t4
            exe: src/calculator
            args: "div 1 5"
          - id: t5
            exe: src/calculator
            args: "car 5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Run single test
        run: |
          cd build
          echo "Running test ${{ matrix.id }}: ./"${{ matrix.exe }} ${{ matrix.args }}
          ./${{ matrix.exe }} ${{ matrix.args }}

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deploy (simulé)
        run: |
          echo "Déploiement de la solution"
name: Automatisation des tests
on: push
jobs:
  Compilation:
    runs-on: ubuntu-latest
    steps:
      - name: Compilation
        run: |
          last_directory=$(basename ${{ runner.workspace }})
          git clone https://github.com/${{ github.repository }}.git
          cd ./$last_directory
          mkdir build
          cd build
          cmake ..
          make
          make test